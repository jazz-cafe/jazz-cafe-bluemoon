<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz cafe Blue moon — Post Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&family=Pinyon+Script&family=Herr+Von+Muellerhoff&family=Monsieur+La+Doulaise&family=Italianno&family=Lovers+Quarrel&family=Euphoria+Script&family=Stalemate&family=Clicker+Script&display=swap');

:root {
  --ink: #141210;
  --surface: #1c1916;
  --gold: #b8945a;
  --gold-light: #d4b07a;
  --smoke: #7a7570;
  --paper: #ede8de;
  --border: rgba(184,148,90,0.22);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--ink); color:var(--paper);
  font-family:'Inconsolata',monospace;
  min-height:100vh; padding:36px 20px 60px;
  display:flex; flex-direction:column; align-items:center;
}
header { text-align:center; margin-bottom:32px; animation:fadeUp 1s ease both; }
.cafe-name { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,4vw,36px); font-weight:300; letter-spacing:0.14em; color:var(--gold); }
.cafe-name em { font-style:italic; color:var(--gold-light); }
.sub { font-size:10px; letter-spacing:0.35em; color:var(--smoke); text-transform:uppercase; margin-top:6px; }
.rule { width:48px; height:1px; background:var(--border); margin:16px auto; }

.wrap { width:100%; max-width:960px; display:grid; grid-template-columns:1fr 1fr; gap:20px; animation:fadeUp 0.8s ease 0.15s both; }
@media(max-width:640px){ .wrap{ grid-template-columns:1fr; } }

/* CANVAS */
.canvas-wrap { position:relative; aspect-ratio:1/1; border-radius:2px; overflow:hidden; border:1px solid var(--border); background:#080604; }
.c-photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1.4s ease; }
.c-photo.show { opacity:0.48; }
.c-grad { position:absolute; inset:0; background:linear-gradient(150deg,rgba(6,4,2,0.72) 0%,rgba(6,4,2,0.08) 42%,rgba(6,4,2,0.88) 100%); }
.c-record { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); opacity:0.13; pointer-events:none; animation:spin 22s linear infinite; }
@media(prefers-reduced-motion:reduce){ .c-record{ animation:none; } }
.c-content { position:absolute; inset:0; padding:24px; display:flex; flex-direction:column; justify-content:space-between; }
.c-top { display:flex; justify-content:space-between; align-items:flex-start; }
.c-label { font-size:8.5px; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); opacity:0.7; }
.c-datestr { font-family:'Cormorant Garamond',serif; font-size:11px; font-style:italic; letter-spacing:0.1em; color:rgba(237,232,222,0.4); }
.c-caption { font-family:'Cormorant Garamond',serif; font-size:clamp(11px,1.6vw,14px); font-weight:300; line-height:1.82; color:var(--paper); white-space:pre-wrap; text-shadow:0 1px 14px rgba(0,0,0,0.95); min-height:3em; }
.c-footer { font-size:8px; letter-spacing:0.24em; color:var(--gold); text-transform:uppercase; opacity:0.55; margin-top:12px; }

.c-logo {
  position:absolute;
  color:rgba(212,176,122,0.88);
  line-height:1.1;
  pointer-events:none;
  text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  transition: opacity 0.3s;
  white-space: nowrap;
}

.font-grid { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.font-thumb {
  background:var(--surface); border:1px solid var(--border);
  border-radius:1px; padding:6px 10px; cursor:pointer;
  transition:all 0.15s; flex: 0 0 auto;
}
.font-thumb:hover { border-color:var(--smoke); }
.font-thumb.on { border-color:var(--gold); background:rgba(184,148,90,0.11); }
.font-thumb span { color:var(--gold); font-size:18px; line-height:1; display:block; }
.font-thumb small { color:var(--smoke); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; display:block; margin-top:2px; }

.tog-row { display:flex; align-items:center; gap:10px; }
.tog-label { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--smoke); }
.tog {
  position:relative; width:34px; height:18px;
  background:var(--border); border-radius:9px;
  cursor:pointer; transition:background 0.2s; flex-shrink:0;
}
.tog.on { background:var(--gold); }
.tog::after {
  content:''; position:absolute; top:2px; left:2px;
  width:14px; height:14px; border-radius:50%;
  background:#fff; transition:transform 0.2s;
}
.tog.on::after { transform:translateX(16px); }

.pos-grid { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
.pos-btn {
  font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.08em;
  padding:4px 9px; border:1px solid var(--border); background:transparent;
  color:var(--smoke); cursor:pointer; transition:all 0.15s; border-radius:1px;
}
.pos-btn:hover { border-color:var(--smoke); color:var(--paper); }
.pos-btn.on { background:rgba(184,148,90,0.11); border-color:var(--gold); color:var(--gold); }

/* Drop zone */
.drop-zone {
  border:1px dashed var(--border); border-radius:2px;
  padding:10px; text-align:center; cursor:pointer;
  transition:border-color 0.2s; font-size:10px;
  letter-spacing:0.15em; color:var(--smoke); text-transform:uppercase;
  background:var(--surface);
}
.drop-zone:hover, .drop-zone.drag { border-color:var(--gold); color:var(--gold); }
.drop-zone input { display:none; }

.photo-thumbs { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.thumb {
  width:44px; height:44px; object-fit:cover; border-radius:1px;
  border:1px solid var(--border); cursor:pointer; opacity:0.7; transition:all 0.15s;
}
.thumb:hover { opacity:1; border-color:var(--gold); }
.thumb.active { opacity:1; border-color:var(--gold); border-width:2px; }

/* Source toggle */
.src-row { display:flex; gap:6px; margin-bottom:2px; }
.src-btn {
  font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.12em;
  text-transform:uppercase; padding:5px 12px; border:1px solid var(--border);
  background:transparent; color:var(--smoke); cursor:pointer; transition:all 0.15s; border-radius:1px;
}
.src-btn.on { background:rgba(184,148,90,0.11); border-color:var(--gold); color:var(--gold); }

/* PANEL */
.panel { display:flex; flex-direction:column; gap:12px; }
.s-label { font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--smoke); margin-bottom:6px; }
.chips { display:flex; flex-wrap:wrap; gap:5px; }
.chip {
  font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.09em;
  padding:5px 10px; border:1px solid var(--border); background:transparent;
  color:var(--smoke); cursor:pointer; transition:all 0.15s; border-radius:1px; text-transform:uppercase;
}
.chip:hover { border-color:var(--smoke); color:var(--paper); }
.chip.on { background:rgba(184,148,90,0.11); border-color:var(--gold); color:var(--gold); }

.ctx-row { display:flex; gap:7px; flex-wrap:wrap; }
.ctx-sel {
  font-family:'Inconsolata',monospace; font-size:11px;
  background:var(--surface); border:1px solid var(--border);
  color:var(--paper); padding:7px 8px; border-radius:1px; cursor:pointer; flex:1; min-width:88px;
}
.ctx-sel option { background:var(--surface); }

.out-box { background:var(--surface); border:1px solid var(--border); padding:15px; border-radius:1px; flex:1; min-height:120px; }
.out-text { font-family:'Cormorant Garamond',serif; font-size:14.5px; font-weight:300; line-height:1.85; color:var(--paper); white-space:pre-wrap; }
.out-tags { font-size:11px; color:var(--gold); line-height:1.9; opacity:0.62; margin-top:11px; word-break:break-word; }

.btn-row { display:flex; gap:8px; }
.btn-gen {
  font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
  background:var(--gold); color:var(--ink); border:none; padding:13px 0; flex:1; cursor:pointer; transition:background 0.18s; border-radius:1px;
}
.btn-gen:hover { background:var(--gold-light); }
.btn-copy {
  font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
  background:transparent; color:var(--smoke); border:1px solid var(--border);
  padding:13px 15px; cursor:pointer; transition:all 0.18s; border-radius:1px;
}
.btn-copy:hover { color:var(--paper); border-color:var(--smoke); }
.btn-save {
  font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
  background:transparent; color:var(--gold); border:1px solid var(--gold);
  padding:11px 0; flex:1; cursor:pointer; transition:all 0.18s; border-radius:1px;
}
.btn-save:hover { background:rgba(184,148,90,0.12); }
.btn-save:disabled { opacity:0.4; cursor:not-allowed; }
.status { font-size:10px; letter-spacing:0.2em; color:var(--smoke); text-align:center; min-height:15px; }
.status.ok { color:var(--gold); }
.status.err { color:#c06050; }

.jacket-drop {
  border:1px dashed var(--border); border-radius:2px;
  padding:14px; text-align:center; cursor:pointer;
  transition:border-color 0.2s; background:var(--surface);
  position:relative;
}
.jacket-drop:hover, .jacket-drop.drag { border-color:var(--gold); }
.jacket-drop input { display:none; }
.jacket-preview {
  width:100%; max-height:120px; object-fit:contain;
  border-radius:1px; margin-top:8px; display:none;
}
.jacket-info {
  font-family:'Cormorant Garamond',serif;
  font-size:13px; font-weight:300; line-height:1.75;
  color:var(--paper); white-space:pre-wrap;
  background:var(--surface); border:1px solid var(--border);
  padding:12px; border-radius:1px; margin-top:8px;
  min-height:60px; display:none;
}
.c-jacket-text {
  position:absolute;
  color:rgba(237,232,222,0.92);
  pointer-events:none;
  text-shadow:0 1px 10px rgba(0,0,0,0.9);
  transition:opacity 0.3s;
  white-space:pre-wrap;
  max-width:85%;
  line-height:1.55;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(9px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { to{transform:translate(-50%,-50%) rotate(360deg)} }
</style>
</head>
<body>

<header>
  <div class="cafe-name">Jazz cafe <em>Blue moon</em></div>
  <div class="sub">Instagram Post Generator</div>
  <div class="rule"></div>
</header>

<div class="wrap">

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap">
    <img class="c-photo" id="bgPhoto" alt="">
    <div class="c-grad"></div>
    <svg class="c-record" width="210" height="210" viewBox="0 0 210 210">
      <circle cx="105" cy="105" r="103" fill="#060402" stroke="#201e18" stroke-width="0.6"/>
      <circle cx="105" cy="105" r="88"  fill="none" stroke="#181612" stroke-width="0.9"/>
      <circle cx="105" cy="105" r="73"  fill="none" stroke="#1c1a14" stroke-width="0.9"/>
      <circle cx="105" cy="105" r="58"  fill="none" stroke="#181612" stroke-width="0.9"/>
      <circle cx="105" cy="105" r="43"  fill="none" stroke="#1c1a14" stroke-width="0.9"/>
      <circle cx="105" cy="105" r="28"  fill="none" stroke="#181612" stroke-width="0.9"/>
      <circle cx="105" cy="105" r="18"  fill="#100e0c" stroke="#282420" stroke-width="0.5"/>
      <circle cx="105" cy="105" r="5.5" fill="#2c2820"/>
      <circle cx="105" cy="105" r="2"   fill="#46423c"/>
    </svg>
    <div class="c-logo" id="logoEl" style="display:none;"></div>
    <div class="c-jacket-text" id="jacketTextEl" style="display:none; top:50%; left:50%; transform:translate(-50%,-50%);"></div>
    <div class="c-content">
      <div class="c-top">
        <div class="c-label">Jazz cafe Blue moon</div>
        <div style="text-align:right">
          <div class="c-datestr" id="canvasDate"></div>
          <div id="openInfoEl" style="font-size:10px; letter-spacing:0.12em; margin-top:3px; opacity:0; transition:opacity 0.3s;"></div>
        </div>
      </div>
      <div>
        <div class="c-caption" id="canvasCaption">—</div>
      </div>
    </div>
  </div>

  <!-- PANEL -->
  <div class="panel">

    <!-- Mood -->
    <div>
      <div class="s-label">今日のムード</div>
      <div class="chips" id="moodChips">
        <button class="chip on"  data-mood="record">レコード</button>
        <button class="chip" data-mood="siphon">サイフォン</button>
        <button class="chip" data-mood="book">読書</button>
        <button class="chip" data-mood="audio">ヴィンテージオーディオ</button>
        <button class="chip" data-mood="quiet">静寂</button>
        <button class="chip" data-mood="adult">大人の時間</button>
        <button class="chip" data-mood="coffee">珈琲</button>
        <button class="chip" data-mood="kissa">ジャズ喫茶</button>
        <button class="chip" data-mood="evening">夕暮れ</button>
        <button class="chip" data-mood="rain">雨の日</button>
        <button class="chip" data-mood="cake">今月の自家製ケーキ</button>
        <button class="chip" data-mood="analog">アナログプレーヤー</button>
        <button class="chip" data-mood="quietpm">静かな午後</button>
        <button class="chip" data-mood="jazzrecord">ジャズレコード</button>
        <button class="chip" data-mood="hotcoffee">熱いコーヒー</button>
        <button class="chip" data-mood="icecoffee">アイスコーヒー</button>
        <button class="chip" data-mood="beans">コーヒー豆</button>
        <button class="chip" data-mood="jbl">JBLのスピーカー</button>
        <button class="chip" data-mood="mac">Macintoshのアンプ</button>
        <button class="chip" data-mood="piano">ピアノ</button>
        <button class="chip" data-mood="bass">ウッドベース</button>
        <button class="chip" data-mood="drums">ドラムス</button>
        <button class="chip" data-mood="sax">テナーサックス</button>
      </div>
    </div>

    <!-- Context -->
    <div>
      <div class="s-label">今日の文脈</div>
      <div class="ctx-row">
        <select class="ctx-sel" id="ctxWeather">
          <option value="clear">天気：晴れ</option>
          <option value="cloudy">天気：曇り</option>
          <option value="rain">天気：雨</option>
        </select>
        <select class="ctx-sel" id="ctxDay">
          <option value="weekday">平日</option>
          <option value="weekend">週末・祝日</option>
        </select>
      </div>
      <div class="ctx-row" style="margin-top:7px">
        <select class="ctx-sel" id="ctxSeason">
          <option value="spring">季節：春</option>
          <option value="summer">季節：夏</option>
          <option value="autumn">季節：秋</option>
          <option value="winter">季節：冬</option>
        </select>
        <select class="ctx-sel" id="ctxGuest">
          <option value="solo">おひとり様</option>
          <option value="couple">カップル</option>
          <option value="general">どなたでも</option>
        </select>
      </div>
      <div class="ctx-row" style="margin-top:7px">
        <select class="ctx-sel" id="ctxMood">
          <option value="none">気分：指定なし</option>
          <option value="happy">気分：楽しい</option>
          <option value="lonely">気分：寂しい</option>
          <option value="joyful">気分：嬉しい</option>
          <option value="melancholy">気分：悲しい</option>
          <option value="calm">気分：穏やか</option>
          <option value="nostalgic">気分：懐かしい</option>
        </select>
        <select class="ctx-sel" id="ctxColor">
          <option value="none">色合い：指定なし</option>
          <option value="bright">色合い：明るめ</option>
          <option value="dark">色合い：暗め</option>
          <option value="normal">色合い：普通</option>
          <option value="light">色合い：薄め</option>
          <option value="deep">色合い：濃いめ</option>
          <option value="white">色合い：白系</option>
          <option value="blue">色合い：青系</option>
          <option value="black">色合い：黒系</option>
          <option value="red">色合い：赤系</option>
          <option value="green">色合い：緑系</option>
        </select>
      </div>
    </div>

    <!-- Photo source -->
    <div>
      <div class="s-label">背景画像</div>
      <div class="src-row">
        <button class="src-btn on" id="srcUnsplash" onclick="setSource('unsplash')">Unsplash</button>
        <button class="src-btn" id="srcOwn" onclick="setSource('own')">自分の写真</button>
      </div>

      <!-- Own photo upload -->
      <div id="ownPhotoArea" style="display:none; margin-top:8px;">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          ここに写真をドロップ または タップして選択
          <input type="file" id="fileInput" accept="image/*" multiple>
        </div>
        <div class="photo-thumbs" id="photoThumbs"></div>
      </div>
    </div>

    <!-- Logo options -->
    <div>
      <div class="s-label">ロゴ・キャプション設定</div>

      <div class="tog-row" style="margin-bottom:8px">
        <div class="tog on" id="togCaption" onclick="toggleCaption()"></div>
        <span class="tog-label">キャプション表示</span>
        <div class="tog" id="togLogo" onclick="toggleLogo()" style="margin-left:16px"></div>
        <span class="tog-label">ロゴ表示</span>
      </div>

      <!-- Open info controls -->
      <div style="margin-top:10px;">
        <div class="s-label">営業情報（日付の下に表示）</div>
        <div class="tog-row" style="margin-bottom:7px;">
          <div class="tog" id="togOpenInfo" onclick="toggleOpenInfo()"></div>
          <span class="tog-label">表示する</span>
        </div>
        <div id="openInfoOptions" style="display:none;">
          <div class="ctx-row" style="margin-bottom:6px;">
            <select class="ctx-sel" id="openStatus" onchange="updateOpenInfo()">
              <option value="open">open 13:00〜17:30</option>
              <option value="closed">本日休業日 / Closed today</option>
              <option value="custom">カスタム入力</option>
            </select>
            <select class="ctx-sel" id="openLang" onchange="updateOpenInfo()">
              <option value="ja">日本語のみ</option>
              <option value="en">英語のみ</option>
              <option value="mix">日英ミックス</option>
            </select>
          </div>
          <div id="openCustomArea" style="display:none; margin-bottom:6px;">
            <input id="openCustomText" type="text" placeholder="カスタムテキスト" style="width:100%; font-family:'Inconsolata',monospace; font-size:11px; background:var(--surface); border:1px solid var(--border); color:var(--paper); padding:7px 9px; border-radius:1px;" oninput="updateOpenInfo()">
          </div>
          <div class="ctx-row">
            <div style="flex:1;">
              <div class="s-label" style="margin-bottom:4px;">フォントサイズ</div>
              <div style="display:flex; align-items:center; gap:6px;">
                <input type="range" id="openFontSize" min="8" max="18" value="10" style="flex:1;" oninput="updateOpenInfo()">
                <span id="openFontSizeVal" style="font-size:10px; color:var(--smoke); min-width:20px;">10</span>
              </div>
            </div>
            <div style="flex:1;">
              <div class="s-label" style="margin-bottom:4px;">カラー</div>
              <div style="display:flex; gap:5px; flex-wrap:wrap;" id="openColorPicker"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="logoOptions" style="display:none">
        <div class="s-label" style="margin-top:8px">ロゴ位置</div>
        <div class="pos-grid">
          <button class="pos-btn on" data-pos="tl" onclick="setLogoPos('tl')">左上</button>
          <button class="pos-btn" data-pos="tc" onclick="setLogoPos('tc')">中央上</button>
          <button class="pos-btn" data-pos="tr" onclick="setLogoPos('tr')">右上</button>
          <button class="pos-btn" data-pos="bl" onclick="setLogoPos('bl')">左下</button>
          <button class="pos-btn" data-pos="bc" onclick="setLogoPos('bc')">中央下</button>
          <button class="pos-btn" data-pos="br" onclick="setLogoPos('br')">右下</button>
        </div>

        <div class="s-label" style="margin-top:10px">ロゴフォントサイズ</div>
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
          <input type="range" id="logoFontSize" min="16" max="52" value="28" style="flex:1;" oninput="updateLogoEl()">
          <span id="logoFontSizeVal" style="font-size:10px; color:var(--smoke); min-width:24px;">28</span>
        </div>

        <div class="s-label">ロゴカラー</div>
        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;" id="logoColorPicker"></div>

        <div class="s-label">筆記体フォント</div>
        <div class="font-grid" id="fontGrid"></div>
      </div>
    </div>

    <!-- Hashtag options -->
    <div>
      <div class="s-label">ハッシュタグ</div>
      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        <button class="pos-btn on" data-ht="show" onclick="setHtMode('show')">付ける</button>
        <button class="pos-btn" data-ht="hide" onclick="setHtMode('hide')">付けない</button>
        <button class="pos-btn" data-ht="add" onclick="setHtMode('add')">追加する</button>
      </div>
      <div id="htAddArea" style="display:none; margin-top:7px;">
        <input id="htExtra" type="text" placeholder="#追加タグ #スペース区切り" style="width:100%; font-family:'Inconsolata',monospace; font-size:11px; background:var(--surface); border:1px solid var(--border); color:var(--paper); padding:7px 9px; border-radius:1px;">
      </div>

/* ── Photo source toggle ── */
function setSource(src) {
  photoSource = src;
  document.getElementById('srcUnsplash').classList.toggle('on', src==='unsplash');
  document.getElementById('srcOwn').classList.toggle('on', src==='own');
  document.getElementById('ownPhotoArea').style.display = src==='own' ? 'block' : 'none';
}

/* ── Own photo upload ── */
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const thumbsEl  = document.getElementById('photoThumbs');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      ownPhotos.push(e.target.result);
      addThumb(e.target.result, ownPhotos.length - 1);
      if (ownPhotos.length === 1) selectOwn(0);
    };
    reader.readAsDataURL(f);
  });
}

function addThumb(src, idx) {
  const img = document.createElement('img');
  img.className = 'thumb';
  img.src = src;
  img.onclick = () => selectOwn(idx);
  thumbsEl.appendChild(img);
}

function selectOwn(idx) {
  activeOwn = idx;
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===idx));
  setCanvasPhoto(ownPhotos[idx]);
}

};

async function loadUnsplashPhoto(mood) {
  const q = UNSPLASH_Q[mood] || 'jazz cafe dark';
  try {
    const res = await fetch(
      `https://api.unsplash.com/photos/random?query=${encodeURIComponent(q)}&orientation=squarish&client_id=${UNSPLASH_KEY}`
    );
    if (!res.ok) throw new Error('Unsplash fetch failed');
    const data = await res.json();
    setCanvasPhoto(data.urls.regular);
  } catch(e) {
    // fallback to picsum
    const id = [1044,431,256,160,412,188,442,206,103,372,341][Object.keys(UNSPLASH_Q).indexOf(mood)] || 1044;
    setCanvasPhoto(`https://picsum.photos/id/${id}/800/800`);
    showStatus('Unsplash接続エラー：代替画像を使用', 'err');
  }
}

function setCanvasPhoto(src) {
  const el = document.getElementById('bgPhoto');
  el.classList.remove('show');
  const tmp = new Image();
  tmp.onload  = () => { el.src = tmp.src; el.classList.add('show'); };
  tmp.onerror = () => {};
  tmp.src = src;
}

function generate() {
  const list = CAPTIONS[activeMood] || CAPTIONS.record;
  let idx;
  do { idx = Math.floor(Math.random() * list.length); } while (list.length > 1 && idx === lastCapIdx);
  lastCapIdx = idx;
  const item = list[idx];

  // Apply color filter to canvas
  const colorCtx = document.getElementById('ctxColor').value;
  const COLOR_FILTER = {
    none:'', bright:'brightness(1.3) saturate(1.1)', dark:'brightness(0.7) saturate(0.9)',
    normal:'brightness(1.0)', light:'brightness(1.2) saturate(0.7)',
    deep:'brightness(0.85) saturate(1.4)', white:'brightness(1.4) saturate(0.3)',
    blue:'brightness(0.9) saturate(1.2) hue-rotate(200deg)',
    black:'brightness(0.6) saturate(0.2)',
    red:'brightness(0.9) saturate(1.3) hue-rotate(330deg)',
    green:'brightness(0.9) saturate(1.2) hue-rotate(100deg)'
  };
  const bgPhoto = document.getElementById('bgPhoto');
  bgPhoto.style.filter = COLOR_FILTER[colorCtx] || '';

  document.getElementById('outText').textContent = item.text;
  const tagsEl = document.getElementById('outTags');
  tagsEl.dataset.base = item.tags;
  renderHashtags();
  document.getElementById('canvasCaption').textContent = showCaption ? item.text : '';

  // Load photo
  if (photoSource === 'own' && ownPhotos.length > 0) {
    const pick = ownPhotos[Math.floor(Math.random() * ownPhotos.length)];
    setCanvasPhoto(pick);
  } else {
    loadUnsplashPhoto(activeMood);
  }
}

function showStatus(msg, type) {
  const s = document.getElementById('statusEl');
  s.textContent = msg;
  s.className = 'status ' + (type || '');
  setTimeout(() => { s.textContent=''; s.className='status'; }, 3000);
}

function copyAll() {
  const caption  = showCaption ? document.getElementById('outText').textContent : '';
  const hashtags = htMode !== 'hide' ? document.getElementById('outTags').textContent : '';
  const base     = document.getElementById('outText').textContent;
  if (!base || base === '—') return;
  const parts = [caption, hashtags].filter(Boolean);
  const full  = htMode === 'hide' ? caption || base : parts.join('\n\n');
  navigator.clipboard.writeText(full.trim()).then(() => showStatus('コピーしました', 'ok'));
}

window.addEventListener('load', () => generate());

let jacketBase64   = null;

let showJacket     = false;
let jacketInfoText = '';

const JACKET_POS_STYLE = {
  tl: { top:'22px',   left:'22px',  right:'auto',  bottom:'auto',  transform:'none' },
  tc: { top:'22px',   left:'50%',   right:'auto',  bottom:'auto',  transform:'translateX(-50%)' },
  tr: { top:'22px',   right:'22px', left:'auto',   bottom:'auto',  transform:'none' },
  c:  { top:'50%',    left:'50%',   right:'auto',  bottom:'auto',  transform:'translate(-50%,-50%)' },
  bl: { bottom:'22px',left:'22px',  right:'auto',  top:'auto',     transform:'none' },
  bc: { bottom:'22px',left:'50%',   right:'auto',  top:'auto',     transform:'translateX(-50%)' },
  br: { bottom:'22px',right:'22px', left:'auto',   top:'auto',     transform:'none' },
};

  updateJacketText();
}

const jacketDrop  = document.getElementById('jacketDrop');
const jacketInput = document.getElementById('jacketInput');

jacketDrop.addEventListener('dragover', e => { e.preventDefault(); jacketDrop.classList.add('drag'); });
jacketDrop.addEventListener('dragleave', () => jacketDrop.classList.remove('drag'));
jacketDrop.addEventListener('drop', e => { e.preventDefault(); jacketDrop.classList.remove('drag'); loadJacketFile(e.dataTransfer.files[0]); });
jacketInput.addEventListener('change', () => loadJacketFile(jacketInput.files[0]));

function loadJacketFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    jacketBase64  = dataUrl.split(',')[1];
    const prev    = document.getElementById('jacketPreview');
    prev.src      = dataUrl;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function recognizeJacket() {
  if (!jacketBase64) { showStatus('先にジャケット写真を選んでください', 'err'); return; }
  const btn = document.getElementById('recognizeBtn');
  const infoEl = document.getElementById('jacketInfo');
  btn.disabled = true;
  btn.textContent = '読み取り中...';
  infoEl.style.display = 'block';
  infoEl.textContent = '解析中です。少しお待ちください...';

  const prompt = `このレコードジャケット画像を見て、以下をコンパクトにまとめてください：

1. アルバム名・アーティスト名
2. 参加ミュージシャン（わかる範囲で）
3. 録音年・レーベル
4. 演奏の特徴・聴きどころ（2〜3文）
5. このアルバムの評価・位置づけ（1〜2文）

日本語で、カフェのInstagram投稿に添える紹介文として自然な文体で。全体150字以内でコンパクトに。`;

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: jacketBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'API error');
    const text = data.content.map(b => b.text || '').join('');
    jacketInfoText = text;
    infoEl.textContent = text;
    document.getElementById('jacketTextOptions').style.display = 'block';
    updateJacketText();
    showStatus('読み取り完了', 'ok');
  } catch(e) {
    infoEl.textContent = 'エラー: ' + e.message;
    showStatus('読み取りに失敗しました', 'err');
  }
  btn.disabled = false;
  btn.textContent = 'ジャケットを読み取る';
}

function setJacketPos(pos) {
  jacketPos = pos;
  document.querySelectorAll('[data-jpos]').forEach(b => b.classList.toggle('on', b.dataset.jpos === pos));
  updateJacketText();
}

function updateJacketText() {
  const el   = document.getElementById('jacketTextEl');
  const size = document.getElementById('jacketFontSize') ? document.getElementById('jacketFontSize').value : 12;
  document.getElementById('jacketFontSizeVal') && (document.getElementById('jacketFontSizeVal').textContent = size);

  if (!showJacket || !jacketInfoText) { el.style.display = 'none'; return; }

  const pos = JACKET_POS_STYLE[jacketPos] || JACKET_POS_STYLE.c;
  el.style.display    = 'block';
  el.style.fontSize   = size + 'px';
  el.style.color      = jacketColor;
  el.textContent      = jacketInfoText;
  Object.assign(el.style, { top:'auto', left:'auto', right:'auto', bottom:'auto', transform:'none' });
  Object.assign(el.style, pos);
}

async function saveImage() {
  const btn = document.querySelector('.btn-save');
  const status = document.getElementById('statusEl');
  const caption = document.getElementById('outText').textContent;
  if (!caption || caption === '—') {
    showStatus('先にGenerateを押してください', 'err');
    return;
  }
  btn.disabled = true;
  showStatus('画像を生成中...', '');

  const canvas = document.getElementById('canvasWrap');
  try {
    const result = await html2canvas(canvas, {
      scale: 3,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#080604',
      width: canvas.offsetWidth,
      height: canvas.offsetHeight,
      logging: false
    });

    // Convert to blob and download
    result.toBlob(blob => {
      const url  = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const date = new Date();
      const fname = `jazzcafe-bluemoon-${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}.jpg`;
      link.href     = url;
      link.download = fname;
      link.click();
      URL.revokeObjectURL(url);
      showStatus('保存しました', 'ok');
    }, 'image/jpeg', 0.95);

  } catch(e) {
    showStatus('画像保存に失敗しました', 'err');
  }
  btn.disabled = false;
}
