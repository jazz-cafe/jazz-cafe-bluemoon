<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz cafe Blue moon — Post Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&display=swap');

:root {
  --ink: #141210;
  --surface: #1c1916;
  --gold: #b8945a;
  --gold-light: #d4b07a;
  --smoke: #7a7570;
  --paper: #ede8de;
  --border: rgba(184,148,90,0.22);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--ink); color:var(--paper);
  font-family:'Inconsolata',monospace;
  min-height:100vh; padding:36px 20px 60px;
  display:flex; flex-direction:column; align-items:center;
}
header { text-align:center; margin-bottom:32px; animation:fadeUp 1s ease both; }
.cafe-name { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,4vw,36px); font-weight:300; letter-spacing:0.14em; color:var(--gold); }
.cafe-name em { font-style:italic; color:var(--gold-light); }
.sub { font-size:10px; letter-spacing:0.35em; color:var(--smoke); text-transform:uppercase; margin-top:6px; }
.rule { width:48px; height:1px; background:var(--border); margin:16px auto; }

.wrap { width:100%; max-width:960px; display:grid; grid-template-columns:1fr 1fr; gap:20px; animation:fadeUp 0.8s ease 0.15s both; }
@media(max-width:640px){ .wrap{ grid-template-columns:1fr; } }

/* CANVAS */
.canvas-wrap { position:relative; aspect-ratio:1/1; border-radius:2px; overflow:hidden; border:1px solid var(--border); background:#080604; }
.c-photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1.4s ease; }
.c-photo.show { opacity:0.48; }
.c-grad { position:absolute; inset:0; background:linear-gradient(150deg,rgba(6,4,2,0.72) 0%,rgba(6,4,2,0.08) 42%,rgba(6,4,2,0.88) 100%); }
.c-record { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); opacity:0.13; pointer-events:none; animation:spin 22s linear infinite; }
@media(prefers-reduced-motion:reduce){ .c-record{ animation:none; } }
.c-content { position:absolute; inset:0; padding:24px; display:flex; flex-direction:column; justify-content:space-between; }
.c-top { display:flex; justify-content:space-between; align-items:flex-start; }
.c-label { font-size:8.5px; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); opacity:0.7; }
.c-datestr { font-family:'Cormorant Garamond',serif; font-size:11px; font-style:italic; letter-spacing:0.1em; color:rgba(237,232,222,0.4); }
.c-caption { font-family:'Cormorant Garamond',serif; font-size:clamp(11px,1.6vw,14px); font-weight:300; line-height:1.82; color:var(--paper); white-space:pre-wrap; text-shadow:0 1px 14px rgba(0,0,0,0.95); min-height:3em; }
.c-footer { font-size:8px; letter-spacing:0.24em; color:var(--gold); text-transform:uppercase; opacity:0.55; margin-top:12px; }

/* Drop zone */
.drop-zone {
  border:1px dashed var(--border); border-radius:2px;
  padding:10px; text-align:center; cursor:pointer;
  transition:border-color 0.2s; font-size:10px;
  letter-spacing:0.15em; color:var(--smoke); text-transform:uppercase;
  background:var(--surface);
}
.drop-zone:hover, .drop-zone.drag { border-color:var(--gold); color:var(--gold); }
.drop-zone input { display:none; }

.photo-thumbs { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.thumb {
  width:44px; height:44px; object-fit:cover; border-radius:1px;
  border:1px solid var(--border); cursor:pointer; opacity:0.7; transition:all 0.15s;
}
.thumb:hover { opacity:1; border-color:var(--gold); }
.thumb.active { opacity:1; border-color:var(--gold); border-width:2px; }

/* Source toggle */
.src-row { display:flex; gap:6px; margin-bottom:2px; }
.src-btn {
  font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.12em;
  text-transform:uppercase; padding:5px 12px; border:1px solid var(--border);
  background:transparent; color:var(--smoke); cursor:pointer; transition:all 0.15s; border-radius:1px;
}
.src-btn.on { background:rgba(184,148,90,0.11); border-color:var(--gold); color:var(--gold); }

/* PANEL */
.panel { display:flex; flex-direction:column; gap:12px; }
.s-label { font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--smoke); margin-bottom:6px; }
.chips { display:flex; flex-wrap:wrap; gap:5px; }
.chip {
  font-family:'Inconsolata',monospace; font-size:10px; letter-spacing:0.09em;
  padding:5px 10px; border:1px solid var(--border); background:transparent;
  color:var(--smoke); cursor:pointer; transition:all 0.15s; border-radius:1px; text-transform:uppercase;
}
.chip:hover { border-color:var(--smoke); color:var(--paper); }
.chip.on { background:rgba(184,148,90,0.11); border-color:var(--gold); color:var(--gold); }

.ctx-row { display:flex; gap:7px; flex-wrap:wrap; }
.ctx-sel {
  font-family:'Inconsolata',monospace; font-size:11px;
  background:var(--surface); border:1px solid var(--border);
  color:var(--paper); padding:7px 8px; border-radius:1px; cursor:pointer; flex:1; min-width:88px;
}
.ctx-sel option { background:var(--surface); }

.out-box { background:var(--surface); border:1px solid var(--border); padding:15px; border-radius:1px; flex:1; min-height:120px; }
.out-text { font-family:'Cormorant Garamond',serif; font-size:14.5px; font-weight:300; line-height:1.85; color:var(--paper); white-space:pre-wrap; }
.out-tags { font-size:11px; color:var(--gold); line-height:1.9; opacity:0.62; margin-top:11px; word-break:break-word; }

.btn-row { display:flex; gap:8px; }
.btn-gen {
  font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
  background:var(--gold); color:var(--ink); border:none; padding:13px 0; flex:1; cursor:pointer; transition:background 0.18s; border-radius:1px;
}
.btn-gen:hover { background:var(--gold-light); }
.btn-copy {
  font-family:'Inconsolata',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
  background:transparent; color:var(--smoke); border:1px solid var(--border);
  padding:13px 15px; cursor:pointer; transition:all 0.18s; border-radius:1px;
}
.btn-copy:hover { color:var(--paper); border-color:var(--smoke); }
.status { font-size:10px; letter-spacing:0.2em; color:var(--smoke); text-align:center; min-height:15px; }
.status.ok { color:var(--gold); }
.status.err { color:#c06050; }

@keyframes fadeUp { from{opacity:0;transform:translateY(9px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { to{transform:translate(-50%,-50%) rotate(360deg)} }
</style>
</head>
<body>

<script>
const UNSPLASH_KEY = 'BlfKi84Fck9LdUpUg2uG1eyg4uzuumopYcsl7hgbImE';

/* ── Date ── */
const now = new Date();
const DAY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('canvasDate').textContent =
  `${DAY[now.getDay()]}. ${MON[now.getMonth()]} ${now.getDate()}`;

const m = now.getMonth();
const sEl = document.getElementById('ctxSeason');
sEl.value = (m<=1||m===11)?'winter':m<=4?'spring':m<=7?'summer':'autumn';
document.getElementById('ctxDay').value = (now.getDay()===0||now.getDay()===6)?'weekend':'weekday';

/* ── State ── */
let activeMood  = 'record';
let photoSource = 'unsplash';
let ownPhotos   = [];
let activeOwn   = null;
let lastCapIdx  = -1;

/* ── Mood chips ── */
document.querySelectorAll('#moodChips .chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#moodChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    activeMood = c.dataset.mood;
  });
});

/* ── Photo source toggle ── */
function setSource(src) {
  photoSource = src;
  document.getElementById('srcUnsplash').classList.toggle('on', src==='unsplash');
  document.getElementById('srcOwn').classList.toggle('on', src==='own');
  document.getElementById('ownPhotoArea').style.display = src==='own' ? 'block' : 'none';
}

/* ── Own photo upload ── */
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const thumbsEl  = document.getElementById('photoThumbs');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      ownPhotos.push(e.target.result);
      addThumb(e.target.result, ownPhotos.length - 1);
      if (ownPhotos.length === 1) selectOwn(0);
    };
    reader.readAsDataURL(f);
  });
}

function addThumb(src, idx) {
  const img = document.createElement('img');
  img.className = 'thumb';
  img.src = src;
  img.onclick = () => selectOwn(idx);
  thumbsEl.appendChild(img);
}

function selectOwn(idx) {
  activeOwn = idx;
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===idx));
  setCanvasPhoto(ownPhotos[idx]);
}

/* ── Unsplash queries per mood ── */
const UNSPLASH_Q = {
  record:  'vinyl record jazz turntable',
  siphon:  'siphon coffee brewing cafe',
  book:    'book cafe coffee reading',
  audio:   'vintage speaker hifi audio',
  quiet:   'dark cafe moody interior',
  adult:   'elegant cafe lounge dark',
  coffee:  'black coffee espresso dark',
  dining:  'jazz restaurant dim candlelight',
  kissa:   'vintage japanese cafe retro',
  evening: 'cafe dusk afternoon golden light',
  rain:    'rainy cafe window coffee',
};

async function loadUnsplashPhoto(mood) {
  const q = UNSPLASH_Q[mood] || 'jazz cafe dark';
  try {
    const res = await fetch(
      `https://api.unsplash.com/photos/random?query=${encodeURIComponent(q)}&orientation=squarish&client_id=${UNSPLASH_KEY}`
    );
    if (!res.ok) throw new Error('Unsplash fetch failed');
    const data = await res.json();
    setCanvasPhoto(data.urls.regular);
  } catch(e) {
    // fallback to picsum
    const id = [1044,431,256,160,412,188,442,206,103,372,341][Object.keys(UNSPLASH_Q).indexOf(mood)] || 1044;
    setCanvasPhoto(`https://picsum.photos/id/${id}/800/800`);
    showStatus('Unsplash接続エラー：代替画像を使用', 'err');
  }
}

function setCanvasPhoto(src) {
  const el = document.getElementById('bgPhoto');
  el.classList.remove('show');
  const tmp = new Image();
  tmp.onload  = () => { el.src = tmp.src; el.classList.add('show'); };
  tmp.onerror = () => {};
  tmp.src = src;
}

function generate() {
  const list = CAPTIONS[activeMood] || CAPTIONS.record;
  let idx;
  do { idx = Math.floor(Math.random() * list.length); } while (list.length > 1 && idx === lastCapIdx);
  lastCapIdx = idx;
  const item = list[idx];

  document.getElementById('outText').textContent = item.text;
  document.getElementById('outTags').textContent = item.tags;
  document.getElementById('canvasCaption').textContent = item.text;

  // Load photo
  if (photoSource === 'own' && ownPhotos.length > 0) {
    const pick = ownPhotos[Math.floor(Math.random() * ownPhotos.length)];
    setCanvasPhoto(pick);
  } else {
    loadUnsplashPhoto(activeMood);
  }
}

function showStatus(msg, type) {
  const s = document.getElementById('statusEl');
  s.textContent = msg;
  s.className = 'status ' + (type || '');
  setTimeout(() => { s.textContent=''; s.className='status'; }, 3000);
}

function copyAll() {
  const caption  = document.getElementById('outText').textContent;
  const hashtags = document.getElementById('outTags').textContent;
  if (!caption || caption === '—') return;
  const full = hashtags ? `${caption}\n\n${hashtags}` : caption;
  navigator.clipboard.writeText(full).then(() => showStatus('コピーしました', 'ok'));
}

window.addEventListener('load', () => generate());
